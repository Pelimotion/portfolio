<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Felipe Conceição — CV & Cover Letter (Private)</title>
    <meta name="robots" content="noindex,nofollow">
    <meta name="description" content="Private CV and Cover Letter — Felipe Conceicao">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&family=Instrument+Serif:ital@0;1&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: ['selector', '[data-theme="dark"]'],
            theme: {
                extend: {}
            }
        }
    </script>

    <!-- Custom Style (overrides Tailwind where needed) -->
    <link rel="stylesheet" href="../style.css">
    <script src="../../theme.js"></script>
</head>
<body class="bg-black text-white selection:bg-white/20 min-h-screen flex flex-col items-center py-20 sm:py-32 relative overflow-x-hidden">
    <!-- Animated bg -->
    <div aria-hidden="true" class="absolute inset-0 pointer-events-none opacity-20">
        <div class="hero-bg-text left animate-drift-x">FC</div>
        <div class="hero-bg-text-cv right animate-float-slow">prv</div>
    </div>

    <div class="z-10 text-center mb-16 reveal-mech visible">
        <div class="font-mono text-[10px] uppercase tracking-widest text-white/30 mb-6">[PRIVATE_ACCESS]</div>
        <h1 class="hero-title text-5xl sm:text-7xl">Select Document<span class="text-white/30">.</span></h1>
    </div>

    <div id="doc-grid" class="z-10 grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-5xl px-6 reveal-mech visible" style="transition-delay: 100ms">
        <a href="cv.html" onclick="navTo(event, 'cv.html')" class="flex-1 group relative overflow-hidden border border-white/20 bg-white/[0.02] p-10 hover:bg-white/[0.05] hover:border-white/50 transition-all duration-500">
            <div class="font-mono text-[10px] tracking-widest text-white/40 mb-8">DOC_01</div>
            <h2 class="text-3xl font-medium mb-2 group-hover:-translate-y-1 transition-transform">Curriculum Vitae</h2>
            <p class="serif italic text-white/50 mb-10 group-hover:-translate-y-1 transition-transform">Full professional experience, education, and toolkit.</p>
            <div class="flex justify-between items-center font-mono text-[10px] uppercase tracking-widest text-white/70">
                <span>View CV</span>
                <span class="group-hover:translate-x-2 transition-transform">→</span>
            </div>
        </a>

        <a href="cl.html" onclick="navTo(event, 'cl.html')" class="group relative overflow-hidden border border-white/20 bg-white/[0.02] p-10 hover:bg-white/[0.05] hover:border-white/50 transition-all duration-500">
            <div class="font-mono text-[10px] tracking-widest text-white/40 mb-8">DOC_02</div>
            <h2 class="text-3xl font-medium mb-2 group-hover:-translate-y-1 transition-transform">Cover Letter</h2>
            <p class="serif italic text-white/50 mb-10 group-hover:-translate-y-1 transition-transform">Personal introduction and strategic alignment.</p>
            <div class="flex justify-between items-center font-mono text-[10px] uppercase tracking-widest text-white/70">
                <span>Read Letter</span>
                <span class="group-hover:translate-x-2 transition-transform">→</span>
            </div>
        </a>

        
    </div>
    
    <div class="absolute bottom-10 font-mono text-[9px] uppercase tracking-[0.3em] text-white/20">
        FC.PRV — Edition 01 / 2025
    </div>
    
    <script src="/Curriculum/script.js"></script>
    <script>
        function navTo(e, file) {
            e.preventDefault();
            let p = window.location.pathname;
            if (p.endsWith('private')) p += '/';
            else if (!p.endsWith('/') && !p.endsWith('.html')) p = p.substring(0, p.lastIndexOf('/') + 1);
            else if (p.endsWith('.html')) p = p.substring(0, p.lastIndexOf('/') + 1);
            window.location.href = p + file;
        }

        // Fetch duplicated applications and inject into grid
        fetch('/site-content.json?v=' + Date.now())
            .then(res => res.json())
            .then(data => {
                if(data.applications && data.applications.length > 0) {
                    const grid = document.getElementById('doc-grid');
                    data.applications.forEach((app, idx) => {
                        const link = document.createElement('a');
                        link.href = `app.html?app=${app.id}`;
                        link.className = "group relative overflow-hidden border transition-all duration-500 p-10";
                        const cColor = app.accentColor || '#34d399';
                        
                        link.style.borderColor = cColor + '66'; // 40% opacity
                        link.style.backgroundColor = cColor + '05'; // 2% opacity
                        
                        link.onmouseenter = () => {
                            link.style.backgroundColor = cColor + '0D'; // 5% opacity
                            link.style.borderColor = cColor;
                        };
                        link.onmouseleave = () => {
                            link.style.backgroundColor = cColor + '05';
                            link.style.borderColor = cColor + '66';
                        };

                        const docNum = String(idx + 3).padStart(2, '0');
                        
                        link.innerHTML = `
                            <div class="font-mono text-[10px] tracking-widest mb-8" style="color:${cColor}b3">DOC_${docNum}_PRIVATE</div>
                            <h2 class="text-3xl font-medium mb-2 group-hover:-translate-y-1 transition-transform text-white">${app.companyName}</h2>
                            <p class="serif italic text-white/50 mb-10 group-hover:-translate-y-1 transition-transform">Custom curriculum and cover letter for ${app.companyName}.</p>
                            <div class="flex justify-between items-center font-mono text-[10px] uppercase tracking-widest" style="color:${cColor}">
                                <span>View Application</span>
                                <span class="group-hover:translate-x-2 transition-transform">→</span>
                            </div>
                        `;
                        
                        link.onclick = (e) => navTo(e, `app.html?app=${app.id}`);
                        
                        grid.appendChild(link);
                    });
                }
            })
            .catch(err => console.error('Failed to load applications:', err));

        document.querySelectorAll('.reveal-mech').forEach(el => setTimeout(() => el.classList.add('visible'), 50));
    </script>
</body>
</html>
