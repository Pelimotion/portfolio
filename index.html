<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pelimotion — Motion Branding & Creative Direction</title>
<meta name="description" content="Pelimotion — Premium motion design studio. Kinetic visual experiences, brand systems, and creative direction.">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#f5f5f5}
body{font-family:'Space Grotesk','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased}

/* ── PARTICLE CANVAS ────────────────────────────────────── */
#particle-canvas{
    position:fixed;inset:0;z-index:0;
    width:100%;height:100%;
    pointer-events:none;
}

/* ── HUB CENTER ─────────────────────────────────────────── */
.hub{
    position:relative;z-index:10;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:100vh;width:100%;gap:36px;padding:40px;
    pointer-events:none; /* canvas receives mouse */
}
.hub > *{pointer-events:auto}

/* Logo */
.hub-logo{width:72px;height:72px;display:block;transition:opacity .3s}
.hub-logo img{width:100%;height:100%;object-fit:contain;display:block}

/* Brand name above buttons */
.hub-brand{
    text-align:center;line-height:1;
}
.hub-brand-name{
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
    font-size:clamp(13px,2vw,20px);font-weight:900;
    letter-spacing:.22em;text-transform:uppercase;color:#111;
}
.hub-brand-sub{
    font-size:8px;font-weight:500;letter-spacing:.35em;
    text-transform:uppercase;color:#999;margin-top:6px;
}

/* Nav buttons — brutalist bar */
.hub-nav{display:flex;gap:0;border:2px solid #111;background:#f5f5f5}
@media(max-width:540px){.hub-nav{flex-direction:column}}

.hub-btn{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    width:180px;height:110px;
    background:transparent;
    text-decoration:none;color:#111;
    border:none;position:relative;overflow:hidden;
    transition:background .18s,color .18s;
    gap:6px;
}
.hub-btn:not(:last-child){border-right:2px solid #111}
@media(max-width:540px){.hub-btn:not(:last-child){border-right:none;border-bottom:2px solid #111}}
.hub-btn:hover{background:#111;color:#f5f5f5}
.hub-btn .btn-title{font-size:12px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;line-height:1}
.hub-btn .btn-sub{font-size:7px;font-weight:500;letter-spacing:.3em;text-transform:uppercase;opacity:.45}

/* Footer */
.hub-footer{font-size:8px;letter-spacing:.25em;text-transform:uppercase;color:#bbb}

/* ── CURSOR ──────────────────────────────────────────────── */
*,*::before,*::after{cursor:none!important}
@media(hover:none),(pointer:coarse){*,*::before,*::after{cursor:auto!important}}
#plm-cursor{
    position:fixed;z-index:99999;pointer-events:none;
    width:10px;height:10px;border-radius:50%;
    background:#111;
    transform:translate(-50%,-50%);top:0;left:0;
    transition:width .1s,height .1s,opacity .12s;
}
#plm-cursor.hover{width:18px;height:18px;opacity:.4}
@media(hover:none),(pointer:coarse){#plm-cursor{display:none}}
</style>
</head>
<body>

<!-- PARTICLE CANVAS -->
<canvas id="particle-canvas" aria-hidden="true"></canvas>

<!-- HUB CENTER -->
<main class="hub" aria-label="Pelimotion hub">
    <a href="V1/portfolio/index.html" class="hub-logo" aria-label="Pelimotion">
        <img src="logo.png" alt="PLM logo">
    </a>

    <div class="hub-brand">
        <div class="hub-brand-name">Pelimotion</div>
        <div class="hub-brand-sub">Motion Branding &amp; Creative Direction</div>
    </div>

    <nav class="hub-nav" aria-label="Main navigation">
        <a href="V1/portfolio/index.html" class="hub-btn" id="btn-portfolio">
            <span class="btn-title">Portfolio</span>
            <span class="btn-sub">Motion Works</span>
        </a>
        <a href="Curriculum/index.html" class="hub-btn" id="btn-curriculum">
            <span class="btn-title">Curriculum</span>
            <span class="btn-sub">Creative Direction</span>
        </a>
    </nav>

    <p class="hub-footer">&copy; 2026 Pelimotion</p>
</main>

<!-- CURSOR -->
<div id="plm-cursor" aria-hidden="true"></div>

<script>
// ── PARTICLE CONSTELLATION (inspired by ShaderToy 4l2XWK) ──────────────────
// White canvas, dark gray particles, connecting lines based on proximity
const canvas = document.getElementById('particle-canvas');
const ctx    = canvas.getContext('2d');

let W, H, mouse = {x: -9999, y: -9999};

function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize, {passive:true});
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; }, {passive:true});

// Config
const N_BASE   = 80;    // base particle count
const MAX_DIST = 160;   // max distance for drawing a line
const MOUSE_R  = 200;   // mouse influence radius
const MOUSE_PULL = 0.018; // how strongly mouse attracts particles
const SPEED    = 0.45;  // base speed
const DOT_R_MIN = 1.2;
const DOT_R_MAX = 2.5;

// Color palette: very subtle — near-black to mid-gray
function randColor(){
    const v = Math.round(30 + Math.random()*120); // 30-150 dark to mid gray
    return `rgb(${v},${v},${v})`;
}

class Particle {
    constructor(){
        this.reset(true);
    }
    reset(init){
        this.x  = Math.random() * (W || window.innerWidth);
        this.y  = Math.random() * (H || window.innerHeight);
        this.vx = (Math.random()-.5)*SPEED;
        this.vy = (Math.random()-.5)*SPEED;
        this.r  = DOT_R_MIN + Math.random()*(DOT_R_MAX - DOT_R_MIN);
        this.color = randColor();
        this.alpha = 0.35 + Math.random()*0.55;
    }
    update(){
        // Gentle mouse attraction
        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;
        const dist = Math.sqrt(dx*dx+dy*dy);
        if(dist < MOUSE_R && dist > 1){
            this.vx += (dx/dist)*MOUSE_PULL;
            this.vy += (dy/dist)*MOUSE_PULL;
        }

        // Speed cap
        const spd = Math.sqrt(this.vx*this.vx+this.vy*this.vy);
        if(spd > SPEED*2){ this.vx *= .92; this.vy *= .92; }

        this.x += this.vx;
        this.y += this.vy;

        // Wrap at edges
        if(this.x < -10) this.x = W+10;
        if(this.x > W+10) this.x = -10;
        if(this.y < -10) this.y = H+10;
        if(this.y > H+10) this.y = -10;
    }
    draw(){
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.alpha;
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

// Adaptive particle count based on screen
function particleCount(){ return Math.min(N_BASE, Math.round(W*H/12000)); }

let particles = [];
function buildParticles(){
    const n = particleCount();
    particles = Array.from({length: n}, ()=>new Particle());
}
buildParticles();
window.addEventListener('resize', ()=>{ buildParticles(); }, {passive:true});

function drawLines(){
    for(let i=0; i<particles.length; i++){
        for(let j=i+1; j<particles.length; j++){
            const a=particles[i], b=particles[j];
            const dx=a.x-b.x, dy=a.y-b.y;
            const d=Math.sqrt(dx*dx+dy*dy);
            if(d > MAX_DIST) continue;
            const alpha = (1 - d/MAX_DIST) * 0.22;
            ctx.beginPath();
            ctx.moveTo(a.x,a.y);
            ctx.lineTo(b.x,b.y);
            ctx.strokeStyle = `rgba(60,60,60,${alpha})`;
            ctx.lineWidth   = 0.8;
            ctx.stroke();
        }

        // Also draw line from particle to mouse if close
        const mx=mouse.x, my=mouse.y;
        const dxm=particles[i].x-mx, dym=particles[i].y-my;
        const dm=Math.sqrt(dxm*dxm+dym*dym);
        if(dm < MOUSE_R){
            const alpha=(1-dm/MOUSE_R)*0.35;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(mx, my);
            ctx.strokeStyle=`rgba(20,20,20,${alpha})`;
            ctx.lineWidth=0.7;
            ctx.stroke();
        }
    }
}

function loop(){
    // Clear to white
    ctx.clearRect(0,0,W,H);
    // Draw connection lines
    drawLines();
    // Draw + update dots
    particles.forEach(p=>{ p.update(); p.draw(); });
    requestAnimationFrame(loop);
}
loop();

// ── CURSOR ────────────────────────────────────────────────────────────────────
const cur = document.getElementById('plm-cursor');
if(cur && window.matchMedia('(hover:hover)').matches){
    window.addEventListener('mousemove', e=>{
        cur.style.left=e.clientX+'px';
        cur.style.top =e.clientY+'px';
        cur.classList.toggle('hover', !!e.target.closest('a,button,.hub-btn'));
    },{passive:true});
}
</script>
</body>
</html>
