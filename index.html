<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Felipe Conceição | Creative Director & Motion Designer</title>
    <meta name="description" content="Portfolio Hub and Curriculum of Felipe Conceição. Creative Director specializing in Motion Branding and Visual Systems.">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #080808;
            --fg: #f5f5f5;
            --accent: #fff;
            --border: rgba(255,255,255,0.1);
            --card-bg: rgba(255,255,255,0.03);
            --card-hover: rgba(255,255,255,0.08);
            --ease: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient Background */
        .ambient-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: move 20s infinite alternate var(--ease);
        }
        .blob-1 { width: 400px; height: 400px; background: #333; top: -100px; left: -100px; }
        .blob-2 { width: 500px; height: 500px; background: #222; bottom: -150px; right: -150px; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(50px, 50px) scale(1.1); }
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 800px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 60px;
        }

        /* Logo Animation */
        .logo-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: invert(1);
            animation: logoPulse 4s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); filter: invert(1) brightness(1); }
            50% { transform: scale(1.05); filter: invert(1) brightness(1.5) drop-shadow(0 0 10px rgba(255,255,255,0.3)); }
        }

        header {
            text-align: center;
        }

        .title {
            font-size: clamp(28px, 5vw, 48px);
            font-weight: 900;
            letter-spacing: -0.04em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .subtitle {
            font-family: 'Roboto Mono', monospace;
            font-size: 12px;
            color: #888;
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }

        /* Destination Grid */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            width: 100%;
        }

        @media (max-width: 600px) {
            .nav-grid { grid-template-columns: 1fr; }
            .container { gap: 40px; }
        }

        .nav-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 200px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            text-decoration: none;
            color: var(--fg);
            transition: all 0.5s var(--ease);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .nav-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255,255,255,0.05) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s var(--ease);
        }

        .nav-card:hover {
            background: var(--card-hover);
            border-color: rgba(255,255,255,0.3);
            transform: translateY(-5px);
        }

        .nav-card:hover::before {
            opacity: 1;
        }

        .nav-card .label {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 12px;
            position: relative;
        }

        .nav-card .desc {
            font-family: 'Roboto Mono', monospace;
            font-size: 10px;
            color: #666;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: color 0.5s var(--ease);
            position: relative;
        }

        .nav-card:hover .desc {
            color: #aaa;
        }

        /* Footer Info */
        footer {
            margin-top: 20px;
            font-size: 10px;
            color: #444;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

    </style>
</head>
<body>

    <div class="ambient-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
        <div class="logo-container">
            <img src="logo.png" class="main-logo-img" alt="Pelimotion Logo">
        </div>
        
        <header>
            <p class="subtitle">Select Destination</p>
        </header>
        
        <nav class="navigation">
            <a href="V1/portfolio/index.html" class="nav-card">
                <span class="nav-title">Portfolio Hub</span>
                <span class="nav-desc">Brutalist Motion Systems & Reel</span>
            </a>
            
            <a href="Curriculum/index.html" class="nav-card">
                <span class="nav-title">Curriculum</span>
                <span class="nav-desc">Experience & Creative Direction</span>
            </a>
        </nav>

        <footer>
            &copy; 2024 Pelimotion. All Rights Reserved.
        </footer>
    </main>

</body>
</html>
