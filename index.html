<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pelimotion — Motion Branding & Creative Direction</title>
<meta name="description" content="Pelimotion — Premium motion design studio. Kinetic visual experiences, brand systems, and creative direction.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#f4f4f2;color:#111}
body{font-family:'Space Grotesk','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased}

.hub{
    display:flex;
    height:100vh;width:100vw;
}

.hub-content{
    flex:1;
    display:flex;flex-direction:column;
    justify-content:space-between;
    padding:3rem;
    border-right:2px solid #111;
    position:relative;z-index:10;
}

.hub-header{
    display:flex;justify-content:space-between;align-items:flex-start;
}
.hub-logo{width:48px;height:48px;display:block;}
.hub-logo img{width:100%;height:100%;object-fit:contain;display:block}
.hub-footer{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#111;}

.hub-middle{
    margin-top:auto;
}

.hub-brand{margin-bottom:3rem;}
.hub-brand-name{
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
    font-size:clamp(3rem,6vw,5.5rem);font-weight:900;
    letter-spacing:-.04em;text-transform:uppercase;color:#111;line-height:.85;
}
.hub-brand-sub{
    font-size:10px;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:#111;
    margin-top:1.5rem;display:inline-block;border:2px solid #111;padding:8px 12px;
}

.hub-nav{
    display:flex;flex-direction:column;gap:0;border:2px solid #111;width:100%;max-width:360px;
}
.hub-btn{
    display:flex;justify-content:space-between;align-items:center;
    height:64px;padding:0 24px;
    background:transparent;color:#111;text-decoration:none;
    transition:background .2s,color .2s;
}
.hub-btn:not(:last-child){border-bottom:2px solid #111}
.hub-btn:hover,.hub-btn:focus-visible{background:#111;color:#f4f4f2;outline:none}
.hub-btn .t{font-size:13px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;}
.hub-btn .s{font-size:9px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;opacity:.6;}

.hub-media{
    flex:1.2;
    position:relative;
    background:#000;
    overflow:hidden;
}
.hub-media video{
    position:absolute;inset:0;
    width:100%;height:100%;object-fit:cover;
    opacity:0.95;
    transition:transform 6s ease-out;
}
.hub-media:hover video{
    transform:scale(1.03);
}

@media(max-width:900px){
    .hub{flex-direction:column-reverse;overflow-y:auto;height:auto;min-height:100vh;}
    .hub-content{border-right:none;padding:2rem;min-height:60vh;justify-content:center;}
    .hub-media{min-height:50vh;flex:none;border-bottom:2px solid #111;}
    .hub-brand{margin-top:2rem;}
    .hub-brand-name{font-size:clamp(2.5rem,10vw,4rem);}
    .hub-nav{max-width:100%;}
    html,body{overflow-y:auto;}
}

/* cursor */
*,*::before,*::after{cursor:none!important}
@media(hover:none),(pointer:coarse){*,*::before,*::after{cursor:auto!important}}
#plm-cursor{
    position:fixed;z-index:99999;pointer-events:none;
    width:12px;height:12px;border:2px solid #111;border-radius:50%;background:transparent;
    transform:translate(-50%,-50%);top:0;left:0;
    transition:width .2s,height .2s,background .2s,border-color .2s;
}
#plm-cursor.hover{
    width:24px;height:24px;background:#111;border-color:#111;mix-blend-mode:difference;
}
#plm-cursor.hover-light{
    background:#f4f4f2;border-color:#f4f4f2;
}
@media(hover:none),(pointer:coarse){#plm-cursor{display:none}}
</style>
</head>
<body>

<main class="hub" aria-label="Pelimotion hub">
    <div class="hub-content">
        <div class="hub-header">
            <a href="V1/portfolio/index.html" class="hub-logo" aria-label="Pelimotion">
                <img src="logo.png" alt="PLM">
            </a>
            <div class="hub-footer">&copy; 2026</div>
        </div>
        
        <div class="hub-middle">
            <div class="hub-brand" aria-hidden="true">
                <div class="hub-brand-name">Pelimotion</div>
                <div class="hub-brand-sub">Motion Branding &amp; Direction</div>
            </div>
            
            <nav class="hub-nav" aria-label="Navigation">
                <a href="V1/portfolio/index.html" class="hub-btn" id="btn-portfolio">
                    <span class="t">Portfolio</span><span class="s">Motion Works</span>
                </a>
                <a href="Curriculum/index.html" class="hub-btn" id="btn-curriculum">
                    <span class="t">Curriculum</span><span class="s">Creative</span>
                </a>
            </nav>
        </div>
    </div>
    
    <div class="hub-media">
        <video autoplay loop muted playsinline>
            <source src="Medias Portfolio/Pelimotion - Reel 2021.mp4" type="video/mp4">
        </video>
    </div>
</main>

<div id="plm-cursor" aria-hidden="true"></div>

<script>
const cur = document.getElementById('plm-cursor');
if(cur && window.matchMedia('(hover:hover)').matches){
    window.addEventListener('mousemove', e=>{
        cur.style.left = e.clientX+'px';
        cur.style.top  = e.clientY+'px';
        
        const isHovering = !!e.target.closest('a,button,.hub-btn');
        const isOverMedia = !!e.target.closest('.hub-media');
        
        cur.classList.toggle('hover', isHovering);
        cur.classList.toggle('hover-light', isOverMedia && isHovering);
        
        if(isOverMedia && !isHovering){
            cur.style.borderColor = '#f4f4f2';
        } else if(!isHovering) {
            cur.style.borderColor = '#111';
        }
    },{passive:true});
}
</script>
</body>
</html>
