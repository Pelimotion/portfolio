<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio — Pelimotion</title>
    <meta name="description" content="Pelimotion Brutalist Portfolio. Selected motion branding systems and visual experiences.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a; --fg: #f0ede8; --fg2: rgba(240,237,232,0.6); --fg3: rgba(240,237,232,0.3);
            --border: rgba(240,237,232,0.12); --card-bg: #111;
            --accent: #f0ede8;
        }
        [data-theme="light"] {
            --bg: #f5f5f5; --fg: #050505; --fg2: #444; --fg3: #999;
            --border: rgba(10,10,10,0.1); --card-bg: #ececec;
            --accent: #050505;
        }
        
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html{background:var(--bg); color:var(--fg); scroll-behavior:smooth;}
        body{
            font-family:'Space Grotesk', sans-serif;
            background:var(--bg); color:var(--fg);
            overflow-x:hidden; -webkit-font-smoothing:antialiased;
        }
        
        /* ─── NAVIGATION ─── */
        #site-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 2000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 2.5rem; height: 64px; border-bottom: 1px solid var(--border);
            background: var(--bg); transition: background .4s;
        }
        .nav-logo { font-size: 13px; font-weight: 900; letter-spacing: .3em; text-transform: uppercase; color: var(--fg); text-decoration: none; }
        .nav-links { display: flex; align-items: center; gap: 2rem; }
        .nav-link { font-size: 10px; font-weight: 700; letter-spacing: .25em; text-transform: uppercase; color: var(--fg2); text-decoration: none; transition: color .2s; cursor: pointer; }
        .nav-link:hover { color: var(--fg); }
        .nav-link.cta { border: 1.5px solid var(--fg); padding: 6px 12px; color: var(--fg); }
        .nav-link.cta:hover { background: var(--fg); color: var(--bg); }
        
        /* ─── HERO BRUTALIST ─── */
        #hero-brutalist {
            display: grid; grid-template-columns: 1fr 1fr;
            height: 100vh; border-bottom: 1.5px solid var(--fg);
            padding-top: 64px; background: var(--bg);
        }
        .hero-left {
            display: flex; flex-direction: column; justify-content: center;
            padding: 0 10%; border-right: 1.5px solid var(--fg);
        }
        .hero-label { font-size: 10px; font-weight: 900; letter-spacing: .5em; text-transform: uppercase; color: var(--fg3); margin-bottom: 2rem; }
        .hero-title { font-size: clamp(3rem, 7vw, 6rem); font-weight: 900; line-height: 0.9; text-transform: uppercase; letter-spacing: -0.04em; }
        .hero-title em { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; text-transform: lowercase; font-size: 0.8em; }
        
        .hero-right { position: relative; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; background: var(--bg); }
        .hero-video { width: 100%; height: 100%; object-fit: cover; opacity: 0; filter: grayscale(1); transition: opacity 1.5s ease, filter 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .hero-right:hover .hero-video { filter: grayscale(0); }
        .hero-video.ready { opacity: 0.85; }
        
        /* ─── GENERATIVE ART LOADER ─── */
        #hero-generative-art { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; transition: opacity 1.5s ease; opacity: 1; }
        #hero-generative-art.fade-out { opacity: 0; }
        #hero-generative-art.buffering { opacity: 0.35; z-index: 10; }
        
        @media(max-width: 900px) {
            #hero-brutalist { grid-template-columns: 1fr; height: auto; }
            .hero-left { padding: 80px 2rem; border-right: none; border-bottom: 1.5px solid var(--fg); }
            .hero-right { aspect-ratio: 16/9; }
        }

        /* ─── PORTFOLIO GRID ─── */
        .content-section { padding: 80px 2.5rem; }
        .grid-brutal { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 40px; }
        
        .client-card {
            border: 1.5px solid var(--border); background: var(--card-bg);
            transition: border-color .3s; cursor: pointer; position: relative;
        }
        .client-card:hover { border-color: var(--fg); }
        .client-card-img-wrap { aspect-ratio: 16/9; overflow: hidden; position: relative; background: #000; }
        .client-card-img { width: 100%; height: 100%; object-fit: cover; transition: transform .6s; }
        .client-card:hover .client-card-img { transform: scale(1.05); }
        
        .client-card-video {
            position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
            opacity: 0; transition: opacity .4s;
        }
        .client-card:hover .client-card-video { opacity: 1; }
        
        .client-card-info { padding: 20px; border-top: 1.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; transition: background .3s, color .3s; }
        .client-card:hover .client-card-info { background: var(--fg); color: var(--bg); }
        .client-name { font-size: 24px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.02em; }
        .client-count { font-size: 10px; font-weight: 900; border: 1px solid var(--border); padding: 4px 8px; }
        .client-card:hover .client-count { border-color: var(--bg); }

        /* ─── GALLERY VIEW ─── */
        #view-gallery { position: fixed; inset: 0; background: var(--bg); z-index: 100; overflow-y: auto; display: none; padding-top: 64px; }
        #view-gallery.active { display: block; }
        .gallery-header { padding: 80px 2.5rem 40px; border-bottom: 1.5px solid var(--border); margin-bottom: 40px; }
        .gallery-title { font-size: clamp(3rem, 10vw, 8rem); font-weight: 900; text-transform: uppercase; line-height: 0.9; letter-spacing: -0.04em; }
        .gallery-desc { font-size: 16px; color: var(--fg2); max-width: 600px; margin-top: 20px; line-height: 1.6; }
        
        /* ─── MODAL ─── */
        #modal {
            position: fixed; inset: 0; background: var(--bg); z-index: 3000;
            display: none; align-items: center; justify-content: center; padding: 40px;
        }
        #modal.active { display: flex; }
        .close-modal { position: absolute; top: 20px; right: 20px; background: none; border: 1.5px solid var(--fg); color: var(--fg); padding: 8px 16px; font-size: 10px; font-weight: 900; cursor: pointer; }
        .player-outer { width: 100%; max-width: 1280px; }
        .player-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border: 1.5px solid var(--fg); }
        video#modal-video { width: 100%; height: 100%; }
        
        /* ─── CURSOR ─── */
        body.plm-cursor-enabled, body.plm-cursor-enabled * { cursor: none !important; }
        #plm-cursor {
            position: fixed; top: 0; left: 0; width: 10px; height: 10px;
            background: var(--fg); border-radius: 50%; pointer-events: none;
            z-index: 9999; transform: translate(-50%, -50%);
            mix-blend-mode: difference; transition: width .3s, height .3s;
            display: none;
        }
        body.plm-cursor-enabled #plm-cursor { display: block; }
        #plm-cursor.hover { width: 40px; height: 40px; background: transparent; border: 1.5px solid var(--fg); }

        /* ─── STRIPS ─── */
        .ca-stripe{position:fixed;top:0;height:100vh;width:24px;pointer-events:none;z-index:800;overflow:hidden;background:var(--bg);border-right:1px solid var(--border);opacity:0.4}
        .ca-stripe-right{left:auto;right:0;border-right:none;border-left:1px solid var(--border)}
        @media(max-width:1100px){.ca-stripe{display:none}}

        /* ─── GALLERY ELEMENTS ─── */
        .btn-brutal {
            font-family: inherit; font-size: 10px; font-weight: 900; letter-spacing: .25em; text-transform: uppercase;
            padding: 12px 24px; border: 1.5px solid var(--fg); background: transparent; color: var(--fg);
            cursor: pointer; transition: all .2s; text-decoration: none; display: inline-block;
        }
        .btn-brutal:hover { background: var(--fg); color: var(--bg); }

        /* ─── MODAL PLAYER V3 ─── */
        #modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 5000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: opacity .4s; padding: 40px;
        }
        #modal.active { display: flex; opacity: 1; }
        .close-modal { position: absolute; top: 30px; right: 30px; background: transparent; border: none; color: #fff; font-size: 24px; cursor: pointer; z-index: 6000; opacity: 0.5; transition: opacity .2s; }
        .close-modal:hover { opacity: 1; }
        
        .player-outer { width: 100%; max-width: 1400px; position: relative; display: flex; flex-direction: column; }
        .player-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; box-shadow: 0 40px 100px rgba(0,0,0,0.8); overflow: hidden; }
        .player-container video { width: 100%; height: 100%; object-fit: contain; }
        
        /* Pause Overlay Info */
        .player-overlay-info {
            position: absolute; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            display: flex; flex-direction: column; justify-content: center; padding: 10%;
            opacity: 0; pointer-events: none; transition: opacity .4s; z-index: 10;
        }
        .player-container.paused .player-overlay-info { opacity: 1; pointer-events: auto; }
        
        .player-nav { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: 24px; }
        .player-nav-btn { background: transparent; border: 1.5px solid rgba(255,255,255,0.2); color: #fff; padding: 12px 24px; font-size: 10px; font-weight: 900; letter-spacing: 0.2em; cursor: pointer; transition: all .2s; }
        .player-nav-btn:hover:not(:disabled) { background: #fff; color: #000; border-color: #fff; }
        .player-nav-btn:disabled { opacity: 0.2; cursor: not-allowed; }

        .player-meta { color: #fff; }
        .player-title { font-size: clamp(24px, 4vw, 48px); font-weight: 900; text-transform: uppercase; letter-spacing: -0.04em; margin-bottom: 8px; }
        .player-client { font-size: 12px; font-weight: 700; letter-spacing: 0.4em; color: rgba(255,255,255,0.4); text-transform: uppercase; }

        .theme-icon { width: 18px; height: 18px; fill: currentColor; display: block; }
        
        .gallery-release { font-size: 14px; line-height: 1.75; color: var(--fg2); max-width: 640px; margin-top: 14px; }
        .gallery-deliverables { font-size: 9px; font-weight: 900; letter-spacing: .3em; text-transform: uppercase; color: var(--fg3); margin-top: 14px; }
        .gallery-deliverables span { color: var(--fg2); }

        .player-meta { width: 100%; padding: 20px 2px 0; display: flex; flex-direction: column; gap: 8px; }
        .player-meta-title { font-size: clamp(14px,2vw,22px); font-weight: 900; text-transform: uppercase; letter-spacing: -.01em; color: var(--fg); }
        .player-meta-release { font-size: 13px; line-height: 1.7; color: var(--fg2); max-width: 680px; }
        .player-meta-deliverable { font-size: 9px; font-weight: 900; letter-spacing: .3em; text-transform: uppercase; color: var(--fg3); padding-top: 6px; border-top: 1px solid var(--border); }

        /* ═══ EXIT LINK ═══ */
        .exit-link {
            position: fixed; bottom: 1.6rem; right: 1.6rem; z-index: 960;
            font-size: 18px; font-weight: 400;
            color: var(--fg); width: 34px; height: 34px;
            border: 1.5px solid var(--fg); display: flex;
            align-items: center; justify-content: center;
            background: var(--bg); transition: all 0.2s;
            text-decoration: none; line-height: 1;
        }
        .exit-link:hover { background: var(--fg); color: var(--bg); }
        @media (max-width: 767px) { .exit-link { bottom: 4rem; right: 1rem; } }

    </style>
</head>
<body>
    <div id="plm-cursor"></div>
    <div class="ca-stripe ca-stripe-left"><canvas id="canvas-l"></canvas></div>
    <div class="ca-stripe ca-stripe-right"><canvas id="canvas-r"></canvas></div>

    <nav id="site-nav">
        <a href="/" class="nav-logo">PELIMOTION</a>
        <div class="nav-links">
            <a href="/#about" class="nav-link" data-pt="ESTÚDIO" data-en="STUDIO">STUDIO</a>
            <a href="/#portfolio-link" class="nav-link" data-pt="TRABALHOS" data-en="WORK">WORK</a>
            <button class="nav-link" onclick="toggleTheme()" id="theme-btn" style="background:none;border:none;padding:0">
                <svg class="theme-icon" viewBox="0 0 24 24" id="moon-icon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                <svg class="theme-icon" viewBox="0 0 24 24" id="sun-icon" style="display:none"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            </button>
            <a href="#" class="nav-link" onclick="toggleLang()" id="lang-btn">PT</a>
            <a href="/#contact" class="nav-link cta" data-pt="CONTATO" data-en="CONTACT">CONTACT</a>
        </div>
    </nav>

    <div id="view-home">
        <section id="hero-brutalist">
            <div class="hero-left">
                <div class="hero-label entrance-mask" data-pt="DIRETOR CRIATIVO & MOTION" data-en="CREATIVE DIRECTOR & MOTION">CREATIVE DIRECTOR & MOTION</div>
                <h1 class="hero-title entrance-mask">
                    Selected<br>
                    <em>works</em><br>
                    2024—26
                </h1>
            </div>
            <div class="hero-right" onclick="toggleHeroVideo(this)">
                <canvas id="hero-generative-art"></canvas>
                <video id="hero-main-vid" class="hero-video" autoplay muted loop playsinline poster="https://pelimotion.b-cdn.net/Medias%20Portfolio/Pelimotion/Institutional/Institutional_CARTAO_10_1920_1080_1.jpg">
                    <source src="https://pelimotion.b-cdn.net/Medias%20Portfolio/PELIMOTION_WHAT_WE_DO.mp4" type="video/mp4">
                </video>
            </div>
        </section>

        <section class="content-section">
            <div class="grid-brutal" id="main-grid">
                <!-- Populated by JS -->
            </div>
        </section>
    </div>

    <div id="view-gallery" class="view-wrapper">
        <div class="gallery-header">
            <h1 id="gallery-title" class="gallery-title">CLIENT NAME</h1>
            <p id="gallery-desc" class="gallery-desc">Description goes here.</p>
        </div>
        <div class="content-section">
            <div class="grid-brutal" id="gallery-grid">
                <!-- Populated by JS -->
            </div>
            <div style="margin-top:80px; text-align:center">
                <button class="btn-brutal" onclick="goHome()" data-pt="← VOLTAR" data-en="← BACK">← BACK</button>
            </div>
        </div>
    </div>

    <div id="modal">
        <button class="close-modal" onclick="closeModal()">✕</button>
        <div class="player-outer">
            <div class="player-container" id="player-container">
                <video id="modal-video" controls autoplay playsinline onplay="onVideoPlay()" onpause="onVideoPause()"></video>
                <div class="player-overlay-info">
                    <div id="modal-title" class="player-title">Project Title</div>
                    <div id="modal-client" class="player-client">Client Name</div>
                </div>
            </div>
            <div class="player-nav">
                <div style="display:flex;gap:10px">
                    <button class="player-nav-btn" onclick="prevMedia()">← PREV</button>
                    <button class="player-nav-btn" onclick="nextMedia()">NEXT →</button>
                </div>
                <div class="player-meta" style="text-align:right">
                    <span id="player-index-count" style="font-size:10px; font-weight:900; color:rgba(255,255,255,0.4)">01 / 12</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let plmContent = {};
        let currentPlaylist = [];
        let currentIndex = -1;
        let currentClientName = '';
        window._PLM_LANG = localStorage.getItem('plm-lang') || 'en';

        function slugify(text) {
            if (!text) return "";
            return text.toString().toLowerCase()
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .replace(/\s+/g, '-')
                .replace(/[^\w\-]+/g, '')
                .replace(/\-\-+/g, '-')
                .replace(/^-+/, '')
                .replace(/-+$/, '');
        }

        function handleRouting() {
            const path = window.location.pathname;
            const parts = path.split('/').filter(p => p);
            if (parts[0] === 'portfolio' && parts[1]) {
                const clientSlug = parts[1];
                const projectSlug = parts[2];
                const clientName = Object.keys(plmContent.clients).find(k => slugify(k) === clientSlug);
                if (clientName) {
                    openGallery(clientName, true);
                    if (projectSlug) {
                        const pIdx = currentPlaylist.findIndex(m => slugify(m.title) === projectSlug);
                        if (pIdx !== -1) setTimeout(() => openModal(pIdx, true), 600);
                    }
                }
            } else if (window.location.hash) {
                const hashName = window.location.hash.substring(1);
                if (plmContent.clients[hashName]) openGallery(hashName, true);
            }
        }

        // ─── INIT ───
        async function initApp() {
            initTheme();
            try {
                const resp = await fetch('../../content.json');
                plmContent = await resp.json();
                renderHome();
                initCursor();
                initScroll();
                initAutomata('canvas-l');
                initAutomata('canvas-r');
                initGenerativeArt();
                updateUI();
                handleRouting();
            } catch (e) {
                console.error("Initialization failed:", e);
                document.getElementById('main-grid').innerHTML = '<p>Error loading projects. Please refresh.</p>';
            }
        }

        function initTheme() {
            const saved = localStorage.getItem('plm-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
            updateThemeIcons(saved);
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('plm-theme', next);
            updateThemeIcons(next);
        }

        function updateThemeIcons(theme) {
            const moon = document.getElementById('moon-icon');
            const sun = document.getElementById('sun-icon');
            if (theme === 'dark') {
                moon.style.display = 'block'; sun.style.display = 'none';
            } else {
                moon.style.display = 'none'; sun.style.display = 'block';
            }
        }

        function initCursor() {
            const c = document.getElementById('plm-cursor');
            if(!c || 'ontouchstart' in window) return;
            document.body.classList.add('plm-cursor-enabled');
            window.addEventListener('mousemove', e => {
                c.style.left = e.clientX + 'px';
                c.style.top = e.clientY + 'px';
                if(e.target.closest('a, button, .client-card, .nav-link, .player-nav-btn')) c.classList.add('hover');
                else c.classList.remove('hover');
            });
        }

        function initAutomata(id) {
            const canvas = document.getElementById(id);
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            let w, h, rows, cols, grid;
            const resize = () => {
                w = canvas.width = canvas.offsetWidth;
                h = canvas.height = canvas.offsetHeight;
                cols = 10; rows = Math.ceil(h / (w/cols));
                grid = Array.from({length:rows*cols}, () => Math.random() > 0.8 ? 1 : 0);
            };
            const draw = () => {
                ctx.clearRect(0,0,w,h);
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--fg');
                const cw = w/cols;
                for(let i=0; i<rows; i++) {
                    for(let j=0; j<cols; j++) {
                        if(grid[i*cols+j]) ctx.fillRect(j*cw, i*cw, cw-1, cw-1);
                    }
                }
                let next = [...grid];
                for(let i=1; i<rows; i++) {
                    for(let j=0; j<cols; j++) {
                        const p = (i-1)*cols;
                        next[i*cols+j] = (grid[p+(j-1+cols)%cols] ^ grid[p+(j+1)%cols]);
                    }
                }
                grid = [...next.slice(cols), ...Array.from({length:cols}, () => Math.random() > 0.95 ? 1 : 0)];
            };
            resize(); window.addEventListener('resize', resize);
            setInterval(draw, 150);
        }

        /* ─── GENERATIVE ART LOADER ─── */
        function initGenerativeArt() {
            const canvas = document.getElementById('hero-generative-art');
            const video = document.getElementById('hero-main-vid');
            if(!canvas || !video) return;
            const ctx = canvas.getContext('2d');
            let w, h, particles = [];
            let progress = 0;
            let animationId;
            let colors = { fg: '#000', fg2: '#666', bg: 'rgba(255,255,255,1)' };

            const updateColors = () => {
                const style = getComputedStyle(document.documentElement);
                const theme = document.documentElement.getAttribute('data-theme') || 'dark';
                colors.fg = style.getPropertyValue('--fg').trim();
                colors.fg2 = style.getPropertyValue('--fg2').trim();
                colors.bg = theme === 'dark' ? 'rgb(8,8,8)' : 'rgb(245,245,245)';
            };

            const resize = () => {
                const rect = canvas.parentElement.getBoundingClientRect();
                w = canvas.width = rect.width;
                h = canvas.height = rect.height;
                initParticles();
                updateColors();
            };

            function initParticles() {
                particles = [];
                // Fewer, longer-lived "worms" for line-based organic feel
                const count = 150;
                for(let i=0; i<count; i++){
                    particles.push({
                        x: Math.random() * w,
                        y: Math.random() * h,
                        vx: 0, vy: 0,
                        history: [], // Store recent positions for line drawing
                        maxLength: Math.random() * 20 + 10,
                        type: Math.random() > 0.5 ? 'fg' : 'fg2'
                    });
                }
            }

            const noise = (x, y, t) => {
                return Math.sin(x * 0.003 + t) * Math.cos(y * 0.003 - t) * Math.PI * 2;
            };

            let isBuffering = false;

            const draw = (t) => {
                const time = t * 0.0002;
                
                // Trails
                ctx.fillStyle = colors.bg.replace('rgb', 'rgba').replace(')', ', 0.08)');
                ctx.fillRect(0, 0, w, h);

                if(video.duration && video.buffered.length > 0){
                    const end = video.buffered.end(video.buffered.length - 1);
                    progress = Math.min(end / video.duration, 1);
                }
                
                // Buffer threshold: Wait for 30% or enough to play through
                const canReveal = (progress > 0.3) || (video.readyState >= 4);
                if(video.readyState >= 3 && !isBuffering && canReveal) progress = 1;

                particles.forEach(p => {
                    const angle = noise(p.x, p.y, time);
                    const speed = 0.3 + (progress * 0.7);
                    p.vx += Math.cos(angle) * 0.1;
                    p.vy += Math.sin(angle) * 0.1;
                    p.vx *= 0.97; p.vy *= 0.97;
                    p.x += p.vx * speed;
                    p.y += p.vy * speed;

                    p.history.push({x: p.x, y: p.y});
                    if(p.history.length > p.maxLength) p.history.shift();

                    if(p.x < 0) { p.x = w; p.history = []; }
                    if(p.x > w) { p.x = 0; p.history = []; }
                    if(p.y < 0) { p.y = h; p.history = []; }
                    if(p.y > h) { p.y = 0; p.history = []; }

                    if(p.history.length > 1){
                        ctx.strokeStyle = p.type === 'fg' ? colors.fg : colors.fg2;
                        ctx.lineWidth = 1.2;
                        ctx.lineCap = 'round';
                        ctx.beginPath();
                        ctx.moveTo(p.history[0].x, p.history[0].y);
                        for(let i=1; i<p.history.length; i++) ctx.lineTo(p.history[i].x, p.history[i].y);
                        ctx.stroke();
                    }
                });

                if(progress < 0.99 || isBuffering) {
                    animationId = requestAnimationFrame(draw);
                } else {
                    revealVideo();
                }
            };

            const revealVideo = () => {
                if(video.classList.contains('ready') && !isBuffering) return;
                
                if(!isBuffering) {
                    ctx.fillStyle = colors.bg;
                    ctx.fillRect(0, 0, w, h);
                }

                video.play().then(() => {
                    video.classList.add('ready');
                    canvas.classList.remove('buffering');
                    canvas.classList.add('fade-out');
                    isBuffering = false;
                }).catch(() => {
                    video.classList.add('ready');
                    canvas.classList.add('fade-out');
                });
            };

            const onWaiting = () => {
                isBuffering = true;
                canvas.classList.remove('fade-out');
                canvas.classList.add('buffering');
                if(!animationId) animationId = requestAnimationFrame(draw);
            };

            const onPlaying = () => {
                isBuffering = false;
                if(video.readyState >= 3) {
                    revealVideo();
                }
            };

            video.addEventListener('waiting', onWaiting);
            video.addEventListener('stalled', onWaiting);
            video.addEventListener('playing', onPlaying);
            video.addEventListener('canplaythrough', revealVideo);
            
            setTimeout(() => { if(video.readyState >= 2) revealVideo(); }, 5000);

            const observer = new MutationObserver(updateColors);
            observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

            resize();
            window.addEventListener('resize', resize);
            animationId = requestAnimationFrame(draw);
        }
        function renderHome() {
            const grid = document.getElementById('main-grid');
            if(!plmContent.clients) return;
            
            let html = '';
            // Respect custom order if available
            const order = plmContent.clientOrder || Object.keys(plmContent.clients).sort();
            
            order.forEach(name => {
                const client = plmContent.clients[name];
                if(!client || client.status === 'private') return;
                const cover = client.coverImage || '';
                const count = client.media ? (client.media.total || 0) : 0;
                
                html += `
                    <div class="client-card entrance-mask" onclick="openGallery('${name}')">
                        <div class="client-card-img-wrap">
                            <img src="${cover}" class="client-card-img" alt="${name}">
                            <video class="client-card-video" muted loop playsinline preload="none">
                                <source src="${client.coverVideo || ''}" type="video/mp4">
                            </video>
                        </div>
                        <div class="client-card-info">
                            <div class="client-name">${name}</div>
                            <div class="client-count">${String(count).padStart(2, '0')}</div>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
            observeMasks();
        }

        function openGallery(name) {
            const client = plmContent.clients[name];
            if(!client) return;
            
            currentClientName = name;
            currentPlaylist = [];
            
            document.getElementById('gallery-title').textContent = name;
            document.getElementById('gallery-desc').textContent = (window._PLM_LANG === 'pt' ? client.description_pt : client.description) || client.description || '';
            
            const grid = document.getElementById('gallery-grid');
            let html = '';
            
            // Collect all media for the playlist
            const rootMedia = client.media?.root || [];
            rootMedia.forEach((m, idx) => {
                currentPlaylist.push({...m, index: currentPlaylist.length});
                html += renderMediaCard(m, currentPlaylist.length - 1);
            });
            
            const cats = client.media?.categories || {};
            Object.entries(cats).forEach(([catName, items]) => {
                html += `<div class="grid-span-all" style="grid-column:1/-1; margin-top:40px; border-bottom:1.5px solid var(--border); padding-bottom:10px; font-size:12px; font-weight:900; color:var(--fg3)">${catName}</div>`;
                items.forEach(m => {
                    currentPlaylist.push({...m, index: currentPlaylist.length});
                    html += renderMediaCard(m, currentPlaylist.length - 1);
                });
            });
            
            grid.innerHTML = html;
            
            document.getElementById('view-home').style.display = 'none';
            const gallery = document.getElementById('view-gallery');
            gallery.classList.add('active');
            window.scrollTo(0,0);
            observeMasks();
            
            if (!arguments[1]) {
                const newPath = '/portfolio/' + slugify(name);
                history.pushState({view: 'gallery', client: name}, '', newPath);
            }
        }

        function renderMediaCard(m, playlistIndex) {
            const title = (window._PLM_LANG === 'pt' ? m.title_pt : m.title) || m.title || '';
            const poster = m.poster_url || m.mosaic?.[1] || '';
            return `
                <div class="client-card entrance-mask" onclick="openModal(${playlistIndex})">
                    <div class="client-card-img-wrap">
                        <img src="${poster}" class="client-card-img" alt="${title}">
                        <video class="client-card-video" muted loop playsinline preload="none" onmouseenter="this.play()" onmouseleave="this.pause();this.currentTime=0">
                            <source src="${m.preview_url || m.video_url}" type="video/mp4">
                        </video>
                    </div>
                    <div class="client-card-info">
                        <div class="client-name" style="font-size:16px">${title}</div>
                    </div>
                </div>
            `;
        }

        function goHome() {
            document.getElementById('view-gallery').classList.remove('active');
            document.getElementById('view-home').style.display = 'block';
            if (!arguments[0]) {
                history.pushState({view: 'home'}, '', '/');
            }
        }

        function openModal(index, silent = false) {
            currentIndex = index;
            const item = currentPlaylist[index];
            if(!item) return;

            const v = document.getElementById('modal-video');
            v.src = item.video_url;
            
            const title = (window._PLM_LANG === 'pt' ? item.title_pt : item.title) || item.title || '';
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-client').textContent = currentClientName;
            document.getElementById('player-index-count').textContent = `${String(index + 1).padStart(2, '0')} / ${String(currentPlaylist.length).padStart(2, '0')}`;
            
            document.getElementById('modal').classList.add('active');
            document.getElementById('player-container').classList.remove('paused');
            updateNavBtns();

            if (!silent) {
                const newPath = '/portfolio/' + slugify(currentClientName) + '/' + slugify(item.title);
                history.pushState({view: 'project', client: currentClientName, index: index}, '', newPath);
            }
        }

        function closeModal() {
            const m = document.getElementById('modal');
            m.classList.remove('active');
            document.getElementById('modal-video').pause();
            document.getElementById('player-container').classList.remove('paused');
            
            // Revert URL to client gallery
            const newPath = '/portfolio/' + slugify(currentClientName);
            history.pushState({view: 'gallery', client: currentClientName}, '', newPath);
        }

        function onVideoPlay() {
            document.getElementById('player-container').classList.remove('paused');
        }
        function onVideoPause() {
            document.getElementById('player-container').classList.add('paused');
        }

        function nextMedia() {
            if(currentIndex < currentPlaylist.length - 1) openModal(currentIndex + 1);
        }
        function prevMedia() {
            if(currentIndex > 0) openModal(currentIndex - 1);
        }
        function updateNavBtns() {
            const btns = document.querySelectorAll('.player-nav-btn');
            btns[0].disabled = currentIndex <= 0;
            btns[1].disabled = currentIndex >= currentPlaylist.length - 1;
        }

        function toggleLang() {
            window._PLM_LANG = window._PLM_LANG === 'en' ? 'pt' : 'en';
            localStorage.setItem('plm-lang', window._PLM_LANG);
            updateUI();
            renderHome();
            if(document.getElementById('view-gallery').classList.contains('active')) openGallery(currentClientName);
        }

        function updateUI() {
            const lang = window._PLM_LANG;
            document.querySelectorAll('[data-' + lang + ']').forEach(el => {
                el.textContent = el.getAttribute('data-' + lang);
            });
            document.getElementById('lang-btn').textContent = lang === 'en' ? 'PT' : 'EN';
        }

        function initScroll() {
            window.addEventListener('scroll', () => {
                const nav = document.getElementById('site-nav');
                if(window.scrollY > 50) nav.style.background = 'var(--bg)';
                else nav.style.background = 'var(--bg)';
            });
        }

        function observeMasks() {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.entrance-mask').forEach(el => observer.observe(el));
        }

        window.onpopstate = (e) => {
            if(e.state) {
                if(e.state.view === 'gallery') openGallery(e.state.client, true);
                else if(e.state.view === 'project') {
                    openGallery(e.state.client, true);
                    openModal(e.state.index, true);
                }
                else goHome(true);
            } else {
                handleRouting();
            }
        };

        function toggleHeroVideo(container) {
            const v = container.querySelector('video');
            if(v.paused) v.play();
            else v.pause();
        }

        initApp();
    </script>
</body>
</html>
